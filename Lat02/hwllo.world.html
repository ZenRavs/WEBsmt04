<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>First Hello World</title>
</head>
<style>
    table,th,td,tr{
        border: 2px solid black;
        border-radius: 5px;
        padding: 5px;
        border-collapse: collapse;
        
    }
</style>
<body>
    <font face="Arial">
        <h5>Font Type "Consolas"</h5>
        <h3>Here's an example:</h3>
        <h4>
            <ol>
                <li>Apple</li>
                <li>Banana</li>
                <li>Cherry</li>
              </ol>
              <p>
                <table>
                    <th>Fruit</th>
                    <th>Priority</th>
                    <p style="text-align: left;">
                        <tr>
                            <td>Apple</td>
                            <td>1</td>   
                        </tr>
                        <tr>
                            <td>Banana</td>
                            <td>3</td>   
                        </tr> 
                        <tr>
                            <td>Cherry</td>
                            <td>2</td>   
                        </tr>   
                    </p> 
                 </table>
              </p>
        </h4>
    </font>
</body>
</html>
